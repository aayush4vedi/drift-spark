name: Feature request
description: Suggest a capability, sink, provider, or migration strategy
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the use case, not just the feature. What are you trying to do today and where does Drift get in the way?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would the API / CLI / behavior look like?
    validations:
      required: false
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other tools or workarounds you've tried.
    validations:
      required: false
  - type: checkboxes
    id: roadmap
    attributes:
      label: Roadmap check
      options:
        - label: I've checked the "Known gaps & roadmap" section of the README and this isn't already planned.
          required: false
