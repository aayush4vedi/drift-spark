name: CI

on:
  push:
    branches: ["**"]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: pip install -e ".[qdrant,pgvector,dev]"
      - name: Ruff
        run: ruff check src/ tests/ examples/ integration-tests/
      - name: Mypy
        run: mypy
        # py.typed is shipped — the type-check gate keeps that promise honest.

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install drift-spark + dev deps
        run: pip install -e ".[qdrant,pgvector,dev]"
        # Excludes pyspark — too heavy for CI; all unit tests mock SparkSession/DataFrames.
        # Spark + Delta paths are covered by integration-tests/ (run locally / Docker).

      - name: Test
        run: pytest tests/ -v --cov=drift --cov-report=xml --cov-report=term-missing

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.11'
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build sdist + wheel
        run: |
          pip install build twine
          python -m build
          twine check dist/*
